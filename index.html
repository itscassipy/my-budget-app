<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cassidy's Budget</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Cassidy Budget">
    
    <link rel="apple-touch-icon" href="image_8.png">
    
    <script src="https://unpkg.com/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
    <style>
        :root {
            --linen: #DDC5A9;
            --venice: #8894B7;
            --shine: #F5C74D;
            --bg-color: #FAF6EE;
            --card-bg: #FFFFFF;
            --text-main: #1C1E24;
            --text-muted: #727B8E;
            --block-pink: #F5D3D3;
            --block-blue: #D3DCF5;
            --block-yellow: #FBE6AD;
            --block-green: #D3F5D9;
            --block-cream: #F6EFE5;
            --success: #527558;
            --warning: #D18D34;
            --danger: #BA6868;
            --border: #EFE9DE;
            --dock-bg: #1A1D26;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 24px 16px; padding-bottom: 120px; }
        .container { max-width: 480px; margin: 0 auto; }
        header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-family: "Georgia", Georgia, serif; font-weight: 400; font-style: italic; font-size: 1.8rem; color: var(--text-main); letter-spacing: -0.5px; text-transform: lowercase; }
        h2 { font-family: "Georgia", Georgia, serif; font-style: italic; font-size: 1.25rem; font-weight: 400; margin-bottom: 20px; color: var(--text-main); display: flex; justify-content: space-between; align-items: center; }
        
        .card { background: var(--card-bg); border-radius: 28px; padding: 24px; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(35,39,51,0.02); border: 1px solid var(--border); overflow: hidden; }
        .stamp-box { width: 42px; height: 48px; border-radius: 12px; background: var(--bg-color); border: 1px dashed var(--linen); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.2s; }
        .stamp-box.claimed { background: var(--block-cream); border: 1px solid var(--linen); }
        .stamp-box.today-active { background: var(--block-yellow); border: 1px solid var(--shine); cursor: pointer; }
        .stamp-lbl { font-size: 0.55rem; font-weight: 800; color: var(--text-muted); margin-bottom: 2px; text-transform: uppercase; }

        .top-showcase-container { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 28px; scrollbar-width: none; }
        .top-showcase-card { min-width: 260px; flex-shrink: 0; background: var(--card-bg); border-radius: 24px; padding: 16px; border: 1px solid var(--border); }
        
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.75rem; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; text-transform: uppercase; }
        input, select.form-input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 16px; font-size: 0.95rem; background: var(--bg-color); }
        button { width: 100%; padding: 16px; background: var(--venice); color: white; border: none; border-radius: 18px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        
        .inline-actions { display: flex; gap: 12px; margin-top: 8px; }
        .btn-inline { background: transparent; color: var(--text-muted); font-size: 0.72rem; border: none; cursor: pointer; text-transform: uppercase; font-weight: 700; }
        .btn-inline.del { color: var(--danger); }

        .bottom-dock { position: fixed; bottom: 16px; left: 16px; right: 16px; background: var(--dock-bg); height: 68px; border-radius: 24px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding: 0 10px; }
        .dock-item { color: #A0AEC0; font-size: 0.72rem; font-weight: 700; border: none; background: transparent; cursor: pointer; }
        .dock-center-btn { background: var(--shine); width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: var(--dock-bg); border: none; cursor: pointer; transform: translateY(-12px); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>lucky girl cass</h1>
            <div id="fluid-balance" style="font-weight: 700; color: var(--success); font-size: 0.95rem; background: var(--card-bg); padding: 6px 14px; border-radius: 14px; border: 1px solid var(--border);">$0</div>
        </header>

        <div class="card">
            <h2>cozy daily check-in</h2>
            <div id="stamp-grid" style="display: flex; justify-content: space-between; gap: 8px;"></div>
        </div>

        <div id="top-progression-showcase" class="top-showcase-container" style="display: none;"></div>

        <div class="card" id="logger-section-anchor">
            <h2>Log Entry</h2>
            <div class="form-group">
                <label>Type</label>
                <select id="tx-type" class="form-input" onchange="toggleFormContext()">
                    <option value="expense">Essential</option>
                    <option value="wishlist">Impulse (48h Lock)</option>
                    <option value="income">Income</option>
                </select>
            </div>
            <div id="dynamic-form-fields"></div>
            <button onclick="submitTransaction()">Record</button>
        </div>

        <div class="card" id="waiting-room-card" style="display: none;">
            <h2>the waiting room ⏳</h2>
            <ul id="wishlist-container" class="tx-list"></ul>
        </div>

        <div class="card">
            <h2>savings pots</h2>
            <div id="pots-container"></div>
        </div>

        <div class="card">
            <h2>ledger</h2>
            <ul id="ledger-container" class="tx-list"></ul>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('cassidyProBudgetState')) || {
            globalBalance: 0,
            wishlist: [],
            stamps: {},
            ledger: [],
            pots: [],
            categoryTargets: [{ name: "Groceries", limit: 450, nonNegotiable: true }]
        };

        function save() {
            localStorage.setItem('cassidyProBudgetState', JSON.stringify(state));
            render();
        }

        // --- Core Logic: Soft-Fail Recalibration ---
        function submitTransaction() {
            const type = document.getElementById('tx-type').value;
            if (type === 'expense') {
                const amt = parseFloat(document.getElementById('field-amount').value);
                
                // Logic: Does this break the budget?
                if (amt > state.globalBalance) {
                    handleOverbudget(amt);
                } else {
                    executeStandardExpense(amt);
                }
            } else if (type === 'wishlist') {
                // ... Existing wishlist logic
            }
            save();
        }

        function handleOverbudget(amt) {
            const choice = prompt(`Budget optimization needed! You are short $${(amt - state.globalBalance).toFixed(2)}. \n\nType '1' to pull from next month, \nType '2' to pull from a Savings Pot, \nType '3' to cancel.`);
            
            if (choice === '1') {
                // Deduct from future balance or flag as debt
                state.globalBalance -= amt;
                alert("Transaction logged as debt. Remember to adjust next cycle!");
            } else if (choice === '2') {
                // Pull from pot logic
                alert("Please select a pot to draw down.");
            } else {
                alert("Entry cancelled. No changes made.");
            }
        }

        function executeStandardExpense(amt) {
            state.globalBalance -= amt;
            // ... add to ledger
        }

        // --- Render logic remains same, just call renderStamps() ---
        function renderStamps() {
            const grid = document.getElementById('stamp-grid');
            grid.innerHTML = '';
            // ... logic to show 7 days with 🌸
        }

        function render() {
            renderStamps();
            // ... rest of render logic
        }

        window.onload = () => { /* init logic */ render(); };
    </script>
</body>
</html>
