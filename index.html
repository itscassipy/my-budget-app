<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cassidy's Budget</title>
    <link rel="apple-touch-icon" href="image_8.png">
    <script src="https://unpkg.com/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
    <style>
        :root {
            --venice: #8894B7; --shine: #F5C74D; --success: #527558; --warning: #D18D34; --danger: #BA6868; 
            --block-pink: #F5D3D3; --block-blue: #D3DCF5; --block-yellow: #FBE6AD; --block-green: #D3F5D9; --block-cream: #F6EFE5;
            --bg-color: #FAF6EE; --card-bg: #FFFFFF; --text-main: #1C1E24; --text-muted: #727B8E; --border: #EFE9DE; --linen: #DDC5A9;
            --dock-bg: #1A1D26; --dock-text: #A0AEC0;
            --hero-gradient: linear-gradient(135deg, #FFFDF9 0%, #F6EFE5 100%);
            --daily-gradient: linear-gradient(135deg, #FFFFFF 0%, #FFFDF9 100%);
            --waiting-gradient: linear-gradient(to bottom, #FFFFFF, #FAF6EE);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 24px 16px; padding-bottom: 120px; transition: background-color 0.8s ease; }
        .container { max-width: 480px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card-bg); border-radius: 28px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border); transition: 0.8s ease; }
        .bottom-dock { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dock-bg); height: 80px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: 12px; }
        .dock-item { color: var(--dock-text); font-size: 0.7rem; font-weight: 700; border: none; background: transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .dock-item.active { color: var(--shine); }
        .token-badge { background: var(--block-yellow); color: #1C1E24; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-card { background: var(--card-bg); border-radius: 28px; padding: 24px; width: 90%; max-width: 400px; }
        .sticker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .sticker-slot { background: var(--bg-color); border: 1px dashed var(--border); border-radius: 12px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .sticker-slot.unlocked { background: var(--card-bg); border: 1px solid var(--venice); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>lucky girl cass <span id="token-display" class="token-badge" style="display: none;">⭐ 0</span></h1>
            <div id="fluid-balance" style="font-weight: 700; color: var(--success);">$0</div>
        </header>

        <div id="tab-home" class="tab-content active">
            <div class="card"><h2>Daily Check-In</h2><div id="stamp-grid" style="display:flex; justify-content:space-between;"></div></div>
            <div id="top-progression-showcase"></div>
            <div id="category-caps-container"></div>
        </div>

        <div id="tab-log" class="tab-content">
            <div class="card">
                <h2>Log Entry</h2>
                <input type="file" id="native-ocr-input" accept="image/*" capture="environment" style="display: none;" onchange="executeOpticalReceiptScan(event)">
                <button onclick="document.getElementById('native-ocr-input').click()">📷 Scan Receipt</button>
                <div id="dynamic-form-fields" style="margin-top:16px;"></div>
                <button onclick="submitTransaction()">Record</button>
            </div>
            <div id="waiting-room-card" class="card" style="display:none;"><h2>Waiting Room</h2><ul id="wishlist-container"></ul></div>
        </div>

        <div id="tab-ledger" class="tab-content">
            <div class="card"><h2>Ledger</h2><ul id="ledger-container"></ul></div>
        </div>

        <div id="tab-garden" class="tab-content">
            <div class="card"><h2>Savings Pots</h2><div id="pots-container"></div></div>
            <div class="card"><h2>Stickers</h2><div id="sticker-grid-container" class="sticker-grid"></div></div>
        </div>
    </div>

    <nav class="bottom-dock">
        <button class="dock-item active" onclick="switchTab('home', this)">🏠 Home</button>
        <button class="dock-item" onclick="switchTab('log', this)">📝 Log</button>
        <button class="dock-item" onclick="switchTab('ledger', this)">📊 Ledger</button>
        <button class="dock-item" onclick="switchTab('garden', this)">🪴 Garden</button>
    </nav>

    <script>
        let state = JSON.parse(localStorage.getItem('cassidyProBudgetState')) || {
            globalBalance: 0, ledger: [], pots: [], wishlist: [], stickers: {}, txCount: 0, bonusTokens: 0, stamps: {}
        };

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.dock-item').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            btn.classList.add('active');
            render();
        }

        function save() {
            localStorage.setItem('cassidyProBudgetState', JSON.stringify(state));
            render();
        }

        function render() {
            // Populate UI based on current active tab
            document.getElementById('dash-balance').innerText = `$${state.globalBalance.toFixed(2)}`;
            // Add your full render logic here
        }

        function init() {
            // Your initialization logic
            render();
        }

        window.onload = init;
    </script>
</body>
</html>
